<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Gabriel Furtado — Data Scientist & ML Engineer</title>
  <meta name="description" content="Data Scientist & ML Engineer. Building end-to-end ML systems from business problem to production API." />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;500;600;700;800&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;1,6..12,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#030712;--surface:#0b1120;--surface2:#111827;
      --border:#1f2937;--border2:#374151;
      --text:#f9fafb;--text2:#9ca3af;--text3:#4b5563;
      --accent:#3b82f6;--cyan:#22d3ee;--green:#10b981;
      --red:#ef4444;--amber:#f59e0b;
      --font-display:'Raleway',sans-serif;
      --font-hero:'Bebas Neue',sans-serif;
      --font-body:'Nunito Sans',sans-serif;
      --font-mono:'JetBrains Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes orbit{from{transform:rotate(var(--start)) translateX(var(--r)) rotate(calc(-1*var(--start)))}to{transform:rotate(calc(var(--start) + 360deg)) translateX(var(--r)) rotate(calc(-1*(var(--start)+360deg)))}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes glow{0%,100%{box-shadow:0 0 30px rgba(59,130,246,.25),0 0 60px rgba(59,130,246,.1)}50%{box-shadow:0 0 40px rgba(59,130,246,.4),0 0 80px rgba(59,130,246,.2)}}

    .fade-up{opacity:0;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) forwards}
    .d1{animation-delay:.05s}.d2{animation-delay:.15s}.d3{animation-delay:.25s}
    .d4{animation-delay:.35s}.d5{animation-delay:.45s}

    nav{
      position:fixed;top:0;left:0;right:0;z-index:50;
      height:60px;display:flex;align-items:center;justify-content:space-between;
      padding:0 48px;
      background:rgba(3,7,18,.88);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .logo{font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--text);text-decoration:none}
    .nav-links{display:flex;gap:28px;list-style:none}
    .nav-links a{font-size:13px;color:var(--text2);text-decoration:none;transition:color .15s;font-weight:500}
    .nav-links a:hover{color:var(--text)}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:6px;font-size:14px;font-weight:500;font-family:var(--font-body);cursor:pointer;transition:all .15s;text-decoration:none;border:none}
    .btn-blue{background:var(--accent);color:#fff}
    .btn-blue:hover{background:#2563eb;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2)}
    .btn-ghost:hover{border-color:var(--text2);transform:translateY(-1px)}
    .btn-sm{padding:6px 14px;font-size:12px}

    .section{padding:96px 48px;max-width:1100px;margin:0 auto}
    .section-label{font-family:var(--font-mono);font-size:11px;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px}
    .section-title{font-family:var(--font-display);font-size:clamp(28px,3vw,38px);font-weight:700;letter-spacing:-1px;margin-bottom:48px}

    .tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:4px;font-family:var(--font-mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);white-space:nowrap}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;transition:border-color .2s,transform .2s}
    .card:hover{border-color:var(--border2);transform:translateY(-2px)}

    .input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color .15s}
    .input:focus{border-color:var(--accent)}
    .mono-link{font-family:var(--font-mono);font-size:12px;color:var(--text2);text-decoration:none;transition:color .15s}
    .mono-link:hover{color:var(--text)}

    /* Photo orbit icons */
    .orbit-icon{
      position:absolute;top:50%;left:50%;
      width:44px;height:44px;margin:-22px;
      border-radius:50%;
      background:var(--surface2);
      border:1px solid var(--border2);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
      animation:orbit var(--dur,12s) linear infinite;
      --start:0deg;--r:170px;
    }

    @media(max-width:900px){
      nav{padding:0 20px}
      .nav-links{display:none}
      .section{padding:64px 20px}
      .hero-grid{grid-template-columns:1fr !important}
      .photo-col{display:none !important}
    }
  </style>
</head>

    function ChurnDemo() {
      const [state,setState] = useState("idle");
      const [result,setResult] = useState(null);
      const [inputs,setInputs] = useState({
        tenure:12, MonthlyCharges:65.5,
        Contract:"Month-to-month", InternetService:"Fiber optic",
        TechSupport:"No", OnlineSecurity:"No",
        gender:"Male", SeniorCitizen:0
      });
      const set=(k,v)=>setInputs(p=>({...p,[k]:v}));
      const buildPayload=inp=>({
        gender:inp.gender, SeniorCitizen:Number(inp.SeniorCitizen),
        Partner:"No", Dependents:"No", tenure:Number(inp.tenure),
        PhoneService:"Yes", MultipleLines:"No",
        InternetService:inp.InternetService, OnlineSecurity:inp.OnlineSecurity,
        OnlineBackup:"No", DeviceProtection:"No", TechSupport:inp.TechSupport,
        StreamingTV:"No", StreamingMovies:"No", Contract:inp.Contract,
        PaperlessBilling:"Yes", PaymentMethod:"Electronic check",
        MonthlyCharges:Number(inp.MonthlyCharges),
        TotalCharges:Number(inp.tenure)*Number(inp.MonthlyCharges)
      });
      const simulate=inp=>{
        let p=0.47;
        if(inp.Contract==="Month-to-month") p+=.22;
        if(inp.Contract==="Two year") p-=.28;
        if(Number(inp.tenure)<6) p+=.16;
        if(Number(inp.tenure)>24) p-=.13;
        if(Number(inp.MonthlyCharges)>80) p+=.10;
        if(inp.InternetService==="Fiber optic"&&inp.TechSupport==="No") p+=.09;
        if(inp.OnlineSecurity==="Yes") p-=.08;
        if(Number(inp.SeniorCitizen)===1) p+=.06;
        return Math.max(.04,Math.min(.96,p));
      };
      const run=async()=>{
        setState("loading");
        try{
          const res=await fetch("https://churn-prediction-ml-e4f1.onrender.com/predict",{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify(buildPayload(inputs)),signal:AbortSignal.timeout(35000)
          });
          if(res.ok){
            const data=await res.json();
            setResult({prob:Number(data.churn_probability??data.probability??0.5),live:true});
            setState("result");return;
          }
        }catch{}
        await new Promise(r=>setTimeout(r,1400));
        setResult({prob:simulate(inputs),live:false});
        setState("result");
      };
      const prob=result?.prob??0;
      const riskColor=prob>.65?"var(--red)":prob>.38?"var(--amber)":"var(--green)";
      const riskLabel=prob>.65?"High Risk":prob>.38?"Medium Risk":"Low Risk";
      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
          <div className="card" style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',letterSpacing:'1.5px'}}>CUSTOMER PROFILE</div>
            {[{k:"tenure",l:"Tenure (months)"},{k:"MonthlyCharges",l:"Monthly Charges ($)"}].map(({k,l})=>(
              <div key={k}>
                <label style={{display:'block',fontSize:'11px',color:'var(--text2)',marginBottom:'5px',fontFamily:'var(--font-mono)'}}>{l}</label>
                <input type="number" className="input" value={inputs[k]} onChange={e=>set(k,e.target.value)} />
              </div>
            ))}
            {[
              {k:"Contract",l:"Contract",opts:["Month-to-month","One year","Two year"]},
              {k:"InternetService",l:"Internet Service",opts:["Fiber optic","DSL","No"]},
              {k:"TechSupport",l:"Tech Support",opts:["No","Yes","No internet service"]},
              {k:"OnlineSecurity",l:"Online Security",opts:["No","Yes","No internet service"]},
              {k:"gender",l:"Gender",opts:["Male","Female"]},
              {k:"SeniorCitizen",l:"Senior Citizen",opts:["0","1"]}
            ].map(({k,l,opts})=>(
              <div key={k}>
                <label style={{display:'block',fontSize:'11px',color:'var(--text2)',marginBottom:'5px',fontFamily:'var(--font-mono)'}}>{l}</label>
                <select className="input" style={{appearance:'none'}} value={inputs[k]} onChange={e=>set(k,e.target.value)}>
                  {opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',paddingTop:'4px'}}>TotalCharges = tenure × MonthlyCharges (auto)</div>
            <button onClick={run} disabled={state==="loading"} className="btn btn-blue"
              style={{marginTop:'6px',justifyContent:'center',opacity:state==="loading"?.7:1,width:'100%'}}>
              {state==="loading"?"Running inference...":"→ Run Prediction"}
            </button>
          </div>
          <div className="card" style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',minHeight:'440px'}}>
            {state==="idle"&&(<div style={{textAlign:'center'}}><div style={{fontSize:'52px',marginBottom:'16px',opacity:.12}}>◎</div><p style={{color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'12px'}}>Adjust parameters and run prediction</p></div>)}
            {state==="loading"&&(<div style={{textAlign:'center'}}><div style={{width:'36px',height:'36px',border:'2px solid var(--border2)',borderTop:'2px solid var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite',margin:'0 auto 16px'}}/><p style={{color:'var(--text2)',fontFamily:'var(--font-mono)',fontSize:'12px',marginBottom:'6px'}}>Calling API...</p><p style={{color:'var(--text3)',fontSize:'11px',fontFamily:'var(--font-mono)'}}>First call may take ~30s (Render cold start)</p></div>)}
            {state==="result"&&result&&(
              <div style={{width:'100%',textAlign:'center'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',marginBottom:'28px',letterSpacing:'1.5px'}}>PREDICTION RESULT{result.live?" · LIVE API":" · SIMULATED"}</div>
                <div style={{position:'relative',width:'180px',height:'90px',margin:'0 auto 20px'}}>
                  <svg viewBox="0 0 180 90" style={{width:'100%',height:'100%'}}>
                    <path d="M12 88 A78 78 0 0 1 168 88" fill="none" stroke="#1f2937" strokeWidth="10" strokeLinecap="round"/>
                    <path d="M12 88 A78 78 0 0 1 168 88" fill="none" stroke={riskColor} strokeWidth="10" strokeLinecap="round" strokeDasharray={`${prob*245} 245`}/>
                  </svg>
                  <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',textAlign:'center'}}>
                    <div style={{fontFamily:'var(--font-display)',fontSize:'32px',fontWeight:700,color:riskColor}}>{Math.round(prob*100)}%</div>
                  </div>
                </div>
                <div style={{fontFamily:'var(--font-display)',fontSize:'22px',fontWeight:600,color:riskColor,marginBottom:'6px'}}>{riskLabel}</div>
                <p style={{color:'var(--text3)',fontSize:'11px',fontFamily:'var(--font-mono)',marginBottom:'20px'}}>Churn probability: {(prob*100).toFixed(1)}%</p>
                {!result.live&&<p style={{color:'var(--text3)',fontSize:'10px',fontFamily:'var(--font-mono)',marginBottom:'16px'}}>* API offline — showing model simulation</p>}
                <button onClick={()=>setState("idle")} className="btn btn-ghost btn-sm">Reset</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function RecSysDemo() {
      const [state,setState] = useState("idle");
      const [result,setResult] = useState(null);
      const [userId,setUserId] = useState(1);
      const [topK,setTopK] = useState(8);
      const run=async()=>{
        setState("loading");
        try{
          const res=await fetch(`https://recsys-retailrocket.onrender.com/recommend?user_id=${userId}&top_k=${topK}`,{
            signal:AbortSignal.timeout(35000)
          });
          if(res.ok){
            const data=await res.json();
            setResult({recs:data.recommendations,live:true});
            setState("result");return;
          }
        }catch{}
        await new Promise(r=>setTimeout(r,1400));
        const mock=[123,10991,10280,4422,4748,6976,15595,7302].slice(0,topK);
        setResult({recs:mock,live:false});
        setState("result");
      };
      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
          <div className="card" style={{display:'flex',flexDirection:'column',gap:'20px'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',letterSpacing:'1.5px'}}>USER PROFILE</div>
            <div>
              <label style={{display:'block',fontSize:'11px',color:'var(--text2)',marginBottom:'5px',fontFamily:'var(--font-mono)'}}>User ID</label>
              <input type="number" className="input" value={userId} min="0" onChange={e=>setUserId(e.target.value)} />
              <p style={{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)',marginTop:'6px'}}>Try any integer — each user has unique purchase history</p>
            </div>
            <div>
              <label style={{display:'block',fontSize:'11px',color:'var(--text2)',marginBottom:'5px',fontFamily:'var(--font-mono)'}}>Top K Recommendations</label>
              <select className="input" style={{appearance:'none'}} value={topK} onChange={e=>setTopK(Number(e.target.value))}>
                {[5,8,10].map(v=><option key={v}>{v}</option>)}
              </select>
            </div>
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'12px'}}>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',marginBottom:'8px'}}>MODEL</div>
              <p style={{fontSize:'12px',color:'var(--text2)',lineHeight:1.6}}>MLP with learned user & item embeddings trained on RetailRocket e-commerce interaction data.</p>
            </div>
            <button onClick={run} disabled={state==="loading"} className="btn btn-blue"
              style={{justifyContent:'center',opacity:state==="loading"?.7:1,width:'100%'}}>
              {state==="loading"?"Fetching recommendations...":"→ Get Recommendations"}
            </button>
          </div>
          <div className="card" style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',minHeight:'380px'}}>
            {state==="idle"&&(<div style={{textAlign:'center'}}><div style={{fontSize:'52px',marginBottom:'16px',opacity:.12}}>◈</div><p style={{color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'12px'}}>Enter a user ID and get recommendations</p></div>)}
            {state==="loading"&&(<div style={{textAlign:'center'}}><div style={{width:'36px',height:'36px',border:'2px solid var(--border2)',borderTop:'2px solid var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite',margin:'0 auto 16px'}}/><p style={{color:'var(--text2)',fontFamily:'var(--font-mono)',fontSize:'12px',marginBottom:'6px'}}>Calling API...</p><p style={{color:'var(--text3)',fontSize:'11px',fontFamily:'var(--font-mono)'}}>First call may take ~30s (Render cold start)</p></div>)}
            {state==="result"&&result&&(
              <div style={{width:'100%'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',marginBottom:'16px',letterSpacing:'1.5px',textAlign:'center'}}>
                  TOP {topK} RECOMMENDATIONS{result.live?" · LIVE API":" · SIMULATED"}
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',marginBottom:'20px'}}>
                  {result.recs.map((id,i)=>(
                    <div key={i} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'6px',padding:'10px',textAlign:'center'}}>
                      <div style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)',marginBottom:'4px'}}>#{i+1}</div>
                      <div style={{fontFamily:'var(--font-mono)',fontSize:'14px',fontWeight:500,color:'var(--accent)'}}>{id}</div>
                      <div style={{fontFamily:'var(--font-mono)',fontSize:'9px',color:'var(--text3)',marginTop:'2px'}}>item_id</div>
                    </div>
                  ))}
                </div>
                {!result.live&&<p style={{color:'var(--text3)',fontSize:'10px',fontFamily:'var(--font-mono)',marginBottom:'12px',textAlign:'center'}}>* API offline — showing cached example</p>}
                <div style={{textAlign:'center'}}><button onClick={()=>setState("idle")} className="btn btn-ghost btn-sm">Reset</button></div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function LiveDemo() {
      const [tab,setTab] = useState("churn");
      const tabs = [
        {id:"churn",  label:"Churn Prediction", sub:"PyTorch · FastAPI · MLflow"},
        {id:"recsys", label:"Recommender System", sub:"PyTorch Embeddings · FastAPI"}

              {tabs.map(t=>(

    function Reasoning() {
      return (
        <div id="reasoning" style={{background:'var(--surface)',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)'}}>

              {REASONING.map((r,i)=>(

                  <h4 style={{fontFamily:'var(--font-display)',fontSize:'16px',fontWeight:600,marginBottom:'12px',lineHeight:1.4}}>{r.q}</h4>

      return (

    function App() {
      return (
        <>
